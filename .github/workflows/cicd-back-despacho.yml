# ============================================================
# CI/CD - Backend Despachos (Spring Boot)
# ------------------------------------------------------------
# Trigger: push a la rama "deploy"
# El Dockerfile vive en Springboot-API-REST-DESPACHO/, así que
# el "context" del build apunta a ese subdirectorio.
# ============================================================

name: Deploy Back-Despachos

on:
  push:
    branches:
      - deploy

env:
  IMAGE_NAME: innovatech-back-despachos
  BUILD_CONTEXT: Springboot-API-REST-DESPACHO

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------- 1. Checkout ----------
      - name: Checkout código
        uses: actions/checkout@v4

      # ---------- 2. Login Docker Hub ----------
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------- 3. Buildx ----------
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------- 4. Build & Push ----------
      - name: Build y Push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.BUILD_CONTEXT }}
          file: ./${{ env.BUILD_CONTEXT }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------- 5. Deploy en EC2 vía SSH ----------
      - name: Deploy en EC2 Back-Despachos
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_DESPACHOS_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/innovatech-back-despachos

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Variables para el compose (incluye conexión al RDS)
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export IMAGE_TAG="${{ github.sha }}"
            export DB_ENDPOINT="${{ secrets.DB_ENDPOINT }}"
            export DB_PORT="${{ secrets.DB_PORT }}"
            export DB_NAME_DESPACHOS="${{ secrets.DB_NAME_DESPACHOS }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans

            docker image prune -f
            docker logout
