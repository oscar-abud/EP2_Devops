# ============================================================
# CI/CD - Ventas Backend
# ------------------------------------------------------------
# Trigger : push a rama "deploy" con cambios en Springboot-API-REST/**
# Flujo   :
#   1) Checkout del código
#   2) Configurar credenciales AWS
#   3) Descubrir EC2 ID y URLs de ECR automáticamente por tag
#   4) Login y push de imagen Docker a ECR
#   5) Deploy en EC2 vía SSM (pull + restart del contenedor)
# Secrets requeridos: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#                     AWS_SESSION_TOKEN, AWS_REGION,
#                     DB_ENDPOINT, DB_PORT, DB_NAME_VENTAS,
#                     DB_USERNAME, DB_PASSWORD
# ============================================================

name: CI/CD Ventas - Backend

on:
  push:
    branches: [ "deploy" ]
    paths:
      - "innovatech_back_ventas/**"

jobs:
  build-push-deploy-back-ventas:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Descubrir IDs desde AWS
      id: aws-ids
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
        REGION="${{ secrets.AWS_REGION }}"
        ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
        ECR_REPO_URL="$ECR_REGISTRY/ventas-back"

        EC2_ID=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=ventas-back" "Name=instance-state-name,Values=running" \
          --query "Reservations[0].Instances[0].InstanceId" \
          --output text)

        echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
        echo "ecr_repo_url=$ECR_REPO_URL" >> $GITHUB_OUTPUT
        echo "ec2_id=$EC2_ID" >> $GITHUB_OUTPUT

    - name: Login en Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build imagen Backend y push a ECR
      run: |
        cd innovatech_back_ventas/Springboot-API-REST
        docker build -t ventas-back .
        docker tag ventas-back:latest ${{ steps.aws-ids.outputs.ecr_repo_url }}:latest
        docker push ${{ steps.aws-ids.outputs.ecr_repo_url }}:latest

    - name: Pausa de estabilización SSM
      run: sleep 30

    - name: Desplegar Backend vía SSM
      run: |
        ECR_REGISTRY="${{ steps.aws-ids.outputs.ecr_registry }}"
        ECR_REPO_URL="${{ steps.aws-ids.outputs.ecr_repo_url }}"
        REGION="${{ secrets.AWS_REGION }}"
        INSTANCE_ID="${{ steps.aws-ids.outputs.ec2_id }}"

        aws ssm send-command \
          --instance-ids "$INSTANCE_ID" \
          --document-name "AWS-RunShellScript" \
          --comment "Actualizar ventas-back desde ECR" \
          --parameters "commands=[
            'set -e',
            'export PATH=\$PATH:/usr/local/bin',
            'aws ecr get-login-password --region $REGION | sudo docker login --username AWS --password-stdin $ECR_REGISTRY',
            'sudo docker pull $ECR_REPO_URL:latest',
            'sudo docker stop ventas-back || true',
            'sudo docker rm ventas-back || true',
            'sudo docker run -d --name ventas-back -p 3001:8080 --env DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} --env DB_PORT=${{ secrets.DB_PORT }} --env DB_NAME=${{ secrets.DB_NAME_VENTAS }} --env DB_USERNAME=${{ secrets.DB_USERNAME }} --env DB_PASSWORD=${{ secrets.DB_PASSWORD }} $ECR_REPO_URL:latest'
          ]" \
          --output text
