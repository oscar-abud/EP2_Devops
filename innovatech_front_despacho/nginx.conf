server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Soporte para React Router (SPA): cualquier ruta no encontrada cae en index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia los backends (ajustar host/puerto según docker-compose o EC2)
    # location /api/despachos/ {
    #     proxy_pass http://back-despachos:8081/;
    # }
    # location /api/ventas/ {
    #     proxy_pass http://back-ventas:8080/;
    # }

    # Cache de assets estáticos
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|gif|jpg|jpeg|png|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Ocultar versión de nginx
    server_tokens off;
}
